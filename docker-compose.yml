version: '3.8'

services:
  wallpaper-admin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://freshness-wallpaper.xyz/api/v1
      - NEXT_PUBLIC_API_TIME_OUT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s